name: sonarcloud

on:
  push:
    branches:
      - principal
      - main
  pull_request:

jobs:
  sonarcloud:
    name: SonarCloud + Pytest Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov PyQt5

      - name: Rodar testes e gerar coverage.xml
        run: |
          pytest TESTES-ETAPAFINAL/tests --cov=TESTES-ETAPAFINAL/service_tag_manager --cov-report=xml:coverage.xml

      - name: Análise no SonarCloud
        uses: SonarSource/sonarqube-scan-action@v2
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}