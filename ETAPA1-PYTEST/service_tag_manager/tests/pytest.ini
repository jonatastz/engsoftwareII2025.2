[pytest]
# Essa seção define configurações globais para o pytest.

addopts = -q
# "addopts" significa "additional options" (opções adicionais).
# O parâmetro "-q" coloca o pytest em modo "quiet" (silencioso),
# mostrando apenas o essencial no terminal — ou seja, um resumo dos testes
# sem linhas de log detalhadas. Ideal para deixar a saída mais limpa.

pythonpath = .
# Define o diretório base (".") como caminho do Python.
# Isso garante que o pytest consiga importar módulos e pacotes do projeto
# sem precisar alterar o sys.path manualmente.
# Em resumo: evita erros de importação ("ModuleNotFoundError") nos testes.
